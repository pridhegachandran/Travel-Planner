version: '3.8'

services:
  backend:
    image: your-docker-registry.com/travel-planner-backend:latest
    container_name: travel-planner-backend-staging
    ports:
      - "5001:5000"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - FLASK_ENV=staging
    depends_on:
      - mongodb
    networks:
      - travel-planner-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: your-docker-registry.com/travel-planner-frontend:latest
    container_name: travel-planner-frontend-staging
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - travel-planner-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongodb:
    image: mongo:5.0
    container_name: travel-planner-mongodb-staging
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=travel_planner_staging
    volumes:
      - mongodb_staging_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - travel-planner-network
    restart: unless-stopped

volumes:
  mongodb_staging_data:

networks:
  travel-planner-network:
    driver: bridge
